    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

      line-height: 1.42;
    }

    a { color: inherit; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .page {
      width: min(calc(100% - 1rem), var(--max-width));
      margin: 0 auto;
      padding: .7rem 0 1.7rem;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin-bottom: .8rem;
      padding-top: .2rem;
    }

    .toolbar-card {
      display: grid;
      gap: .5rem;
      padding: .72rem .78rem;
      background: rgba(255,255,255,0.93);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(219, 228, 236, 0.96);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 140px;
      gap: .48rem;
      align-items: center;
    }

    .field {
      min-width: 0;
    }

    input[type="search"], select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .58rem .72rem;
      font-size: .85rem;
      color: var(--text);
      background: var(--surface);
      min-height: 36px;
    }

    input[type="search"]:focus, select:focus, .btn:focus {
      outline: 3px solid rgba(33, 92, 156, 0.16);
      outline-offset: 1px;
      border-color: rgba(33, 92, 156, 0.55);
    }

    .toolbar-bottom {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
    }

    .results {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
      align-items: center;
      color: var(--muted);
      font-size: .79rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .24rem .54rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      white-space: nowrap;
      color: var(--muted);
      font-size: .74rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: .42rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      min-height: 36px;
      padding: .54rem .72rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: .72rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .card-media {

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cover-link,
    .cover {

      position: relative;

      aspect-ratio: 210 / 297;
      background: linear-gradient(160deg, rgba(33,92,156,0.08), rgba(14,134,179,0.04));

      border: 1px solid var(--border);
      border-radius: 10px;

    function normalizeKey(key) {
      return String(key || '').trim().toLowerCase();
    }

    function normalizeRow(row) {
      const normalized = Object.fromEntries(Object.entries(row).map(([key, value]) => [normalizeKey(key), String(value ?? '').trim()]));
      return {
        title: normalized.title || '',
        creators: normalized.creators || '',
        publisher_or_journal: normalized.publisher_or_journal || normalized.publisher || '',
        type: normalized.type || '',
        year: normalized.year || '',
        details: normalized.details || '',
        url: normalized.url || '',
        access: normalized.access || '',
        language: normalized.language || '',
        cover_url: normalized.cover_url || ''
      };
    }

    function normalizeTitle(title) {
      return String(title || '')
        .normalize('NFD')
        .replace(/\p{Diacritic}/gu, '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, ' ')
        .trim();
    }

    function normalizeUrl(url) {
      return String(url || '')
        .trim()
        .toLowerCase()
        .replace(/^https?:\/\//, '')
        .replace(/\/$/, '');
    }

    function rowKey(row) {
      return normalizeUrl(row.url) || normalizeTitle(row.title);
    }

    function mergeRow(base, override) {
      return {
        title: override.title || base.title || '',
        creators: override.creators || base.creators || '',
        publisher_or_journal: override.publisher_or_journal || base.publisher_or_journal || '',
        type: override.type || base.type || '',
        year: override.year || base.year || '',
        details: override.details || base.details || '',
        url: override.url || base.url || '',
        access: override.access || base.access || '',
        language: override.language || base.language || '',
        cover_url: override.cover_url || base.cover_url || ''
      };
    }

    function combineRows(liveRows, fallbackRows) {
      const map = new Map();

      fallbackRows.map(normalizeRow).forEach(row => {
        map.set(rowKey(row), row);
      });

      liveRows.map(normalizeRow).forEach(row => {
        const key = rowKey(row);
        const existing = map.get(key) || {};
        map.set(key, mergeRow(existing, row));
      });

      return [...map.values()];
    }

    function csvToRows(text) {

      let i = 0;

        const next = text[i + 1];

        if (inQuotes) {
          if (char === '"' && next === '"') {
            value += '"';
            i += 2;
            continue;
          }
          if (char === '"') {
            inQuotes = false;
            i += 1;
            continue;
          }
          value += char;
          i += 1;
          continue;
        }

        if (char === '"') {
          inQuotes = true;
          i += 1;
          continue;
        }
        if (char === ',') {
          row.push(value);
          value = '';
          i += 1;
          continue;
        }
        if (char === '\n') {
          row.push(value);
          out.push(row);
          row = [];
          value = '';
          i += 1;
          continue;
        }
        if (char === '\r') {
          i += 1;
          continue;
        }

        value += char;
        i += 1;
      }

      if (value.length > 0 || row.length > 0) {
        row.push(value);
        out.push(row);
      }

      if (!out.length) return [];
      const headers = out[0].map(normalizeKey);
      return out.slice(1)
        .filter(record => record.some(cell => String(cell || '').trim() !== ''))
        .map(record => Object.fromEntries(headers.map((header, idx) => [header, record[idx] ?? ''])));
    }

    function bookSearchText(book) {
      return [book.title, book.creators, book.publisher_or_journal, book.type, book.year, book.details, book.access, book.language]
        .join(' ')
        .toLowerCase();
    }

    function sortRows(data, mode) {
      const copy = [...data];
      copy.sort((a, b) => {
        if (mode === 'year-asc' || mode === 'year-desc') {
          const ay = Number.parseInt(a.year, 10);
          const by = Number.parseInt(b.year, 10);
          const safeAY = Number.isFinite(ay) ? ay : (mode === 'year-asc' ? Number.MAX_SAFE_INTEGER : Number.MIN_SAFE_INTEGER);
          const safeBY = Number.isFinite(by) ? by : (mode === 'year-asc' ? Number.MAX_SAFE_INTEGER : Number.MIN_SAFE_INTEGER);
          if (safeAY !== safeBY) return mode === 'year-asc' ? safeAY - safeBY : safeBY - safeAY;
          return a.title.localeCompare(b.title, undefined, { sensitivity: 'base' });
        }
        if (mode === 'publisher-asc') {
          return (a.publisher_or_journal || '').localeCompare((b.publisher_or_journal || ''), undefined, { sensitivity: 'base' })
            || a.title.localeCompare(b.title, undefined, { sensitivity: 'base' });
        }
        return a.title.localeCompare(b.title, undefined, { sensitivity: 'base' });
      });
      return copy;
    }

    function createPlaceholder(book) {
      const placeholder = document.createElement('div');
      placeholder.className = 'cover-placeholder';

      const top = document.createElement('div');
      top.className = 'cover-top';
      if (book.year) {
        const year = document.createElement('span');
        year.className = 'cover-year';
        year.textContent = book.year;
        top.appendChild(year);
      }
      placeholder.appendChild(top);

      const note = document.createElement('p');
      note.className = 'cover-note';
      note.textContent = 'Cover coming soon';
      placeholder.appendChild(note);

      return placeholder;
    }

    function createCover(book) {
      const shell = document.createElement('div');
      shell.className = 'card-media';

      const tagName = book.url ? 'a' : 'div';
      const cover = document.createElement(tagName);
      cover.className = book.url ? 'cover-link' : 'cover';
      if (book.url) {
        cover.href = book.url;
        cover.target = '_blank';
        cover.rel = 'noopener noreferrer';
        cover.setAttribute('aria-label', `Open reference for ${book.title || 'this item'}`);
      }

      if (book.cover_url) {
        const img = document.createElement('img');
        img.src = book.cover_url;
        img.alt = book.title ? `Cover of ${book.title}` : 'Book cover';
        img.loading = 'lazy';
        img.referrerPolicy = 'no-referrer';
        img.addEventListener('error', () => {
          img.remove();
          cover.appendChild(createPlaceholder(book));
        }, { once: true });
        cover.appendChild(img);
      } else {
        cover.appendChild(createPlaceholder(book));
      }

      shell.appendChild(cover);
      return shell;
    }

    function renderCard(book) {
      const card = document.createElement('article');
      card.className = 'card';

      card.appendChild(createCover(book));

      const body = document.createElement('div');
      body.className = 'card-body';

      const divider = document.createElement('hr');
      divider.className = 'divider';
      body.appendChild(divider);

      const title = document.createElement('h3');
      title.className = 'card-title';
      if (book.url) {
        const link = document.createElement('a');
        link.href = book.url;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = book.title || 'Untitled';
        title.appendChild(link);
      } else {
        title.textContent = book.title || 'Untitled';
      }
      body.appendChild(title);

      if (book.creators) {
        const creators = document.createElement('p');
        creators.className = 'card-creators';
        creators.textContent = book.creators;
        body.appendChild(creators);
      }

      const publisherParts = [book.publisher_or_journal, book.year].filter(Boolean);
      if (publisherParts.length) {
        const publisherLine = document.createElement('p');
        publisherLine.className = 'publisher-line';
        publisherLine.textContent = publisherParts.join(' · ');
        body.appendChild(publisherLine);
      }

      if (book.details) {
        const details = document.createElement('p');
        details.className = 'details';
        details.textContent = book.details;
        body.appendChild(details);
      }

      const meta = document.createElement('div');
      meta.className = 'card-meta';
      if (book.type) {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = book.type;
        meta.appendChild(tag);
      }
      if (meta.children.length) body.appendChild(meta);

      if (book.url) {
        const ref = document.createElement('a');
        ref.className = 'reference-link';
        ref.href = book.url;
        ref.target = '_blank';
        ref.rel = 'noopener noreferrer';
        ref.textContent = 'Open reference';
        body.appendChild(ref);
      }

      card.appendChild(body);
      return card;
    }

    function getVisibleRows() {
      const query = els.search.value.trim().toLowerCase();
      const sortBy = els.sortBy.value;

      const filtered = rows.filter(book => {
        if (query && !bookSearchText(book).includes(query)) return false;
        return true;
      });

      return sortRows(filtered, sortBy);
    }

    function render() {
      const visible = getVisibleRows();
      els.gallery.innerHTML = '';

      if (!visible.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.innerHTML = '<strong>No matching entries.</strong><br>Try broadening the search terms.';
        els.gallery.appendChild(empty);
      } else {
        visible.forEach(book => els.gallery.appendChild(renderCard(book)));
      }

      els.resultsText.textContent = `${visible.length} shown · ${rows.length} total`;
    }

    function csvEscape(value) {
      const text = String(value ?? '');
      if (/["\n,]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function downloadCsv() {
      const headers = ['title','creators','publisher_or_journal','type','year','details','url','access','language','cover_url'];
      const lines = [
        headers.join(','),
        ...rows.map(row => headers.map(header => csvEscape(row[header] || '')).join(','))
      ];
      const blob = new Blob(["\ufeff" + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'water_books_survey.csv';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function loadRows() {
      try {
        const response = await fetch(CSV_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        const liveRows = csvToRows(text);
        rows = combineRows(liveRows, FALLBACK_ROWS);
        els.sourcePill.textContent = 'Live sheet + embedded snapshot';
      } catch (error) {
        rows = FALLBACK_ROWS.map(normalizeRow);
        els.sourcePill.textContent = 'Embedded snapshot';
      }

      render();
    }

    els.search.addEventListener('input', render);
    els.sortBy.addEventListener('change', render);
    els.resetBtn.addEventListener('click', () => {
      els.search.value = '';
      els.sortBy.value = 'year-desc';
      render();
    });
    els.downloadBtn.addEventListener('click', downloadCsv);

    loadRows();
  </script>
</body>
</html>
